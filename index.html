<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cisco × Interrupt 2026</title>

<!-- ═══════════════════════════════════════════════════════════
     ROOT REDIRECT
     This file controls which variant the booth page opens at
     the root URL: https://tdominic-cisco1.github.io/interrupt-2026/

     To flip the booth between themes, edit the TARGET value in
     the <script> below (and the matching meta-refresh URL), then
     commit and push:

         TARGET = "dark"   → redirect to /dark/
         TARGET = "light"  → redirect to /light/

     Both variants stay accessible at their direct URLs:
       /dark/   — original deep-navy deck
       /light/  — cxai-assistant booth color scheme
     ═══════════════════════════════════════════════════════════ -->

<script>
  // ── CONFIG ────────────────────────────────────────────────
  var TARGET = "dark";   // ← edit this to "dark" or "light"
  // ──────────────────────────────────────────────────────────
  var url = "./" + TARGET + "/" + (location.search || "") + (location.hash || "");
  location.replace(url);
</script>

<!-- Fallback: noscript meta refresh, kept in sync with TARGET above. -->
<meta http-equiv="refresh" content="0; url=./dark/">
<link rel="canonical" href="https://tdominic-cisco1.github.io/interrupt-2026/dark/">

<style>
  html, body { margin: 0; padding: 0; height: 100%;
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f7f7f7; color: #0f1214; }
  .wrap { display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100%; padding: 24px; text-align: center; gap: 18px; }
  h1 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: -.01em; }
  p  { margin: 0; color: rgba(15,18,20,.62); }
  .links { display: flex; gap: 12px; margin-top: 4px; }
  a { display: inline-flex; align-items: center; padding: 8px 14px;
    border-radius: 999px; text-decoration: none; font-weight: 600; font-size: 14px;
    color: #fff; background: #0f1214; transition: background 120ms ease; }
  a.alt { background: #fff; color: #0f1214; border: 1px solid rgba(15,18,20,.14); }
  a:hover { background: #1a1f24; }
  a.alt:hover { background: #fafbfc; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Cisco × Interrupt 2026 — booth deck</h1>
  <p>Redirecting…</p>
  <div class="links">
    <a href="./dark/">Open dark variant</a>
    <a class="alt" href="./light/">Open light variant</a>
  </div>
</div>
</body>
</html>
